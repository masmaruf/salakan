alamat: |
  Balai Padukuhan Salakan
  Kalurahan Bangunjiwo
  Kapanewon Kasihan
kontakWhatsApp: '6283867181105'
email: info@salakan.id
jamLayanan: Senin-Ahad, 24Jam
linkPeta: >-
  https://maps.google.com/maps?q=-7.837031,110.292387&z=18&output=embed
sambutanBeranda: >
  Selamat datang di website Padukuhan Salakan. Portal ini disiapkan untuk
  membantu warga memperoleh agenda, informasi warga, dan dokumentasi kegiatan secara
  cepat tanpa meninggalkan karakter lokal yang hangat dan tertata.
seoHalamanData:
  dataUtama:
    seoTitle: Data Kampung
    seoDescription: Pusat akses data, dokumen, UMKM, dan informasi kampung Padukuhan Salakan.
  dokumen:
    seoTitle: Dokumen Warga
    seoDescription: >-
      Halaman dokumen warga untuk arsip layanan, format surat, dan dokumen
      publik Padukuhan Salakan.
  umkm:
    seoTitle: UMKM Warga
    seoDescription: Katalog UMKM dan potensi ekonomi warga Padukuhan Salakan.
  strukturOrganisasi:
    seoTitle: Lembaga Padukuhan
    seoDescription: Halaman lembaga dan organisasi yang berada di wilayah Padukuhan Salakan.
  agenda:
    seoTitle: Agenda Warga
    seoDescription: >-
      Jadwal kegiatan dan agenda warga Padukuhan Salakan yang sedang berjalan
      dan akan datang.
  program:
    seoTitle: Program Warga
    seoDescription: >-
      Peta program kerja, pembangunan, dan tindak lanjut layanan publik
      Padukuhan Salakan yang bisa dipantau warga.
  kasRt:
    seoTitle: Transparansi Kas RT
    seoDescription: >-
      Ringkasan laporan kas RT warga Padukuhan Salakan yang disusun agar mudah
      dipantau dari satu halaman.
  inventaris:
    seoTitle: Inventaris Warga
    seoDescription: >-
      Daftar inventaris bersama, status ketersediaan, dan penanggung jawab
      peminjaman warga Padukuhan Salakan.
  layananWarga:
    seoTitle: Layanan Warga
    seoDescription: >-
      Informasi layanan warga, syarat, langkah, dan kontak layanan Padukuhan
      Salakan.
  faq:
    seoTitle: FAQ Warga
    seoDescription: >-
      Pertanyaan yang sering diajukan warga Padukuhan Salakan beserta
      jawabannya.
  monografi:
    seoTitle: Monografi Padukuhan
    seoDescription: Data resmi monografi, kependudukan, dan fasilitas Padukuhan Salakan.
menuData:
  title: Data & Informasi Kampung
  description: >
    Halaman ini disiapkan sebagai pusat akses menuju data padukuhan, dokumen,
    informasi UMKM, profil wilayah, dan lembaga padukuhan.
  items:
    - label: Dokumen
      href: /data/dokumen
      description: >-
        Arsip surat, format layanan, dan dokumen publik yang dapat diakses
        warga.
      icon: description
      status: tampil
    - label: UMKM
      href: /data/umkm
      description: >-
        Daftar usaha warga, produk unggulan, dan potensi ekonomi lokal
        padukuhan.
      icon: storefront
      status: tampil
    - label: Lembaga
      href: /data/lembaga
      description: Daftar lembaga dan organisasi warga yang aktif di Padukuhan Salakan.
      icon: account_tree
      status: tampil
    - label: Agenda
      href: /agenda
      description: >-
        Jadwal kegiatan warga dan agenda padukuhan yang sedang atau akan
        berjalan.
      icon: event
      status: tampil
    - label: Transparansi Kas RT
      href: /data/kas-rt
      description: >-
        Ringkasan pemasukan, pengeluaran, dan saldo kas RT yang disusun untuk
        dibaca cepat oleh warga.
      icon: account_balance_wallet
      status: tampil
    - label: Inventaris Warga
      href: /data/inventaris
      description: >-
        Daftar barang bersama, status ketersediaan, lokasi simpan, dan
        penanggung jawab inventaris warga.
      icon: inventory_2
      status: tampil
    - label: Layanan Warga
      href: /data/layanan-warga
      description: >-
        Informasi layanan warga, syarat, langkah, dan kontak yang bisa
        dihubungi.
      icon: description
      status: tampil
    - label: Program Warga
      href: /program
      description: >-
        Pantau program kerja, pembangunan, status pelaksanaan, dan manfaat
        yang sedang dikerjakan untuk warga.
      icon: timeline
      status: tampil
    - label: FAQ
      href: /data/faq
      description: Daftar pertanyaan umum warga yang bisa dibaca cepat dari satu halaman.
      icon: contact_support
      status: tampil
    - label: Monografi
      href: /data/monografi
      description: Statistik demografi, kependudukan, dan profil wilayah resmi dari Dukuh.
      icon: analytics
      status: tampil

