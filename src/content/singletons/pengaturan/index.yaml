sambutanBeranda: >
  Selamat datang di website Padukuhan Salakan. Portal ini disiapkan untuk
  membantu warga memperoleh pengumuman, agenda, dan dokumentasi kegiatan secara
  cepat tanpa meninggalkan karakter lokal yang hangat dan tertata.
seoHalamanData:
  dataUtama:
    seoTitle: Data Kampung
    seoDescription: Pusat akses data, dokumen, UMKM, dan informasi kampung Padukuhan Salakan.
  pengumuman:
    seoTitle: Pengumuman Warga
    seoDescription: >-
      Halaman data pengumuman untuk melihat informasi aktif warga Padukuhan
      Salakan.
  dokumen:
    seoTitle: Dokumen Warga
    seoDescription: >-
      Halaman dokumen warga untuk arsip layanan, format surat, dan dokumen
      publik Padukuhan Salakan.
  umkm:
    seoTitle: UMKM Warga
    seoDescription: Katalog UMKM dan potensi ekonomi warga Padukuhan Salakan.
  strukturOrganisasi:
    seoTitle: Struktur Organisasi
    seoDescription: Halaman struktur organisasi dan peran layanan Padukuhan Salakan.
  agenda:
    seoTitle: Agenda Warga
    seoDescription: >-
      Jadwal kegiatan dan agenda warga Padukuhan Salakan yang sedang berjalan
      dan akan datang.
  layananWarga:
    seoTitle: Layanan Warga
    seoDescription: >-
      Informasi layanan warga, syarat, langkah, dan kontak layanan Padukuhan
      Salakan.
  faq:
    seoTitle: FAQ Warga
    seoDescription: >-
      Pertanyaan yang sering diajukan warga Padukuhan Salakan beserta
      jawabannya.
  monografi:
    seoTitle: Monografi Padukuhan
    seoDescription: Data resmi monografi, kependudukan, dan fasilitas Padukuhan Salakan.
menuData:
  title: Data & Informasi Kampung
  description: >
    Halaman ini disiapkan sebagai pusat akses menuju data padukuhan, dokumen,
    informasi UMKM, profil wilayah, dan struktur organisasi.
  items:
    - label: Pengumuman
      href: /agenda
      description: >-
        Pengumuman aktif padukuhan dan agenda kegiatan warga dalam satu
        halaman.
      icon: campaign
      status: tampil
    - label: Dokumen
      href: /data/dokumen
      description: >-
        Arsip surat, format layanan, dan dokumen publik yang dapat diakses
        warga.
      icon: description
      status: tampil
    - label: UMKM
      href: /data/umkm
      description: >-
        Daftar usaha warga, produk unggulan, dan potensi ekonomi lokal
        padukuhan.
      icon: storefront
      status: tampil
    - label: Struktur Organisasi
      href: /data/struktur-organisasi
      description: Susunan pengurus, perangkat, dan penanggung jawab layanan warga.
      icon: account_tree
      status: tampil
    - label: Agenda
      href: /agenda
      description: >-
        Jadwal kegiatan warga dan agenda padukuhan yang sedang atau akan
        berjalan.
      icon: event
      status: tampil
    - label: Layanan Warga
      href: /data/layanan-warga
      description: >-
        Informasi layanan warga, syarat, langkah, dan kontak yang bisa
        dihubungi.
      icon: description
      status: tampil
    - label: FAQ
      href: /data/faq
      description: Daftar pertanyaan umum warga yang bisa dibaca cepat dari satu halaman.
      icon: contact_support
      status: tampil
    - label: Monografi
      href: /data/monografi
      description: Statistik demografi, kependudukan, dan profil wilayah resmi dari Dukuh.
      icon: analytics
      status: tampil
