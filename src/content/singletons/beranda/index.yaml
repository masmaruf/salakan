hero:
  eyebrow: Padukuhan Salakan
  title: Pusat informasi warga Padukuhan Salakan
  intro: >-
    Selamat datang di website Padukuhan Salakan. Portal ini disiapkan untuk
    membantu warga memperoleh agenda, informasi, dan dokumentasi kegiatan
    secara cepat tanpa meninggalkan karakter lokal yang hangat dan tertata.
  primaryCtaLabel: Lihat agenda warga
  primaryCtaHref: /agenda
  secondaryCtaLabel: Baca profil padukuhan
  secondaryCtaHref: /profil
  panelLabel: Informasi utama warga
  panelTitle: Layanan utama warga dalam satu halaman
  panelNote: >-
    Website ini dirancang sebagai ruang informasi yang cepat dibuka, mudah
    diperbarui, dan tetap terasa dekat dengan identitas lokal padukuhan.
  panelLinks:
    - title: Agenda Warga
      description: Lihat info prioritas warga, jadwal kegiatan, dan agenda yang sedang berjalan.
      href: /agenda
      icon: event
      status: tampil
    - title: Berita
      description: Baca arsip kegiatan warga dan artikel terbaru padukuhan.
      href: /berita
      icon: newspaper
      status: tampil
    - title: Data Kampung
      description: Masuk ke katalog data, dokumen, UMKM, dan struktur kampung.
      href: /data
      icon: grid_view
      status: tampil
    - title: Program Warga
      description: Pantau program kerja dan pembangunan yang sedang berjalan.
      href: /program
      icon: timeline
      status: tampil
  stats:
    agendaValue: 6
    agendaLabel: Agenda aktif
    kegiatanValue: 8
    kegiatanLabel: Berita terdokumentasi
    galeriValue: 3
    galeriLabel: Galeri tersedia
agenda:
  title: Agenda prioritas
  description: Bagian ini menempatkan informasi paling penting untuk warga di posisi paling mudah terlihat.
  ctaLabel: Buka halaman agenda
berita:
  title: Berita terbaru
  description: Satu berita unggulan ditampilkan lebih dominan, sementara artikel lain tetap mudah dipindai warga lewat format editorial yang ringkas.
  ctaLabel: Lihat semua berita
galeri:
  title: Galeri pilihan
  description: Dokumentasi visual tetap hadir di beranda, tetapi dibuat lebih ringkas agar fokus utama tetap pada informasi warga.
  ctaLabel: Buka galeri lengkap
penutup:
  eyebrow: Lanjutkan pencarian informasi
  title: Butuh data kampung atau ingin menghubungi layanan warga?
  description: >-
    Beranda ini dibuat sebagai pintu masuk. Untuk eksplorasi lebih lanjut,
    gunakan katalog data kampung atau langsung menuju halaman kontak resmi.
  primaryCtaLabel: Buka data kampung
  primaryCtaHref: /data
  secondaryCtaLabel: Kontak & layanan
  secondaryCtaHref: /kontak


