judul: Jadwal Posyandu Balita dan Lansia April 2026
tanggal: 2026-04-16
ringkasan: >
  Kegiatan posyandu dilaksanakan pada Sabtu, 16 April 2026 pukul 07.00 WIB di
  Rumah Bpk Dukuh Ma'ruf Cahyadi.
isi: >
  Warga yang memiliki balita maupun anggota keluarga lansia diharapkan hadir
  tepat waktu.

  Mohon membawa buku KIA atau kartu pemeriksaan yang biasa digunakan agar
  pendataan berjalan lancar.
