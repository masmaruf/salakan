judul: Kerja Bakti Lingkungan Ahad Pagi
tanggal: 2026-04-12
ringkasan: |
  Seluruh warga diimbau mengikuti kerja bakti kebersihan jalan lingkungan dan saluran air.
isi: |
  Titik kumpul berada di gardu RT setempat mulai pukul 06.30 WIB.

  Warga diharapkan membawa alat kebersihan sederhana seperti sapu, cangkul, atau sabit sesuai kebutuhan.
