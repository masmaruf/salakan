namaLayanan: Pengantar Surat Domisili
ringkasan: >-
  Layanan pengantar surat domisili untuk keperluan administrasi warga dengan
  alur yang sederhana dan mudah dipahami.
syarat:
  - Membawa fotokopi KTP
  - Membawa fotokopi Kartu Keluarga
