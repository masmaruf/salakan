judul: Kerja Bakti Pagi Hari
tanggal: 2026-03-10
gambar: /images/galeri/kerja-bakti-pagi/gambar.svg
caption: |
  Kebersamaan warga saat membersihkan lingkungan menjadi potret gotong royong yang paling terasa di tingkat padukuhan.
deskripsi: |
  Dokumentasi ini menampilkan semangat gotong royong warga dalam menjaga lingkungan tetap bersih dan nyaman. Kegiatan kerja bakti menjadi pengingat bahwa kebersihan kampung dikerjakan bersama, mulai dari halaman rumah, jalan lingkungan, hingga ruang publik yang dipakai warga.
