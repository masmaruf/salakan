media:
  input: public/images
  output: /images

content:
  # ─── COLLECTIONS ────────────────────────────────────────────────

  - name: pengumuman
    label: Pengumuman
    type: collection
    path: src/content/pengumuman
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [judul, tanggal]
      primary: judul
      default:
        sort: tanggal
        order: desc
    fields:
      - name: judul
        label: Judul
        type: string
        required: true
      - name: tanggal
        label: Tanggal
        type: date
      - name: ringkasan
        label: Ringkasan
        type: text
      - name: isi
        label: Isi pengumuman
        type: text
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: statusPublikasi
            label: Status tayang
            type: select
            options:
              values:
                - value: publish
                  label: Publish / Tayang
                - value: draft
                  label: Draft / Belum tayang
            default: publish
          - name: unggulan
            label: Tandai sebagai pengumuman unggulan
            type: boolean
            default: false

  - name: dokumen
    label: Dokumen
    type: collection
    path: src/content/dokumen
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [judul, tanggalUpdate]
      primary: judul
      default:
        sort: tanggalUpdate
        order: desc
    fields:
      - name: judul
        label: Judul dokumen
        type: string
        required: true
      - name: tanggalUpdate
        label: Tanggal pembaruan
        type: date
      - name: kontenUtama
        label: Konten Utama
        type: object
        fields:
          - name: ringkasan
            label: Ringkasan
            type: text
          - name: deskripsi
            label: Deskripsi lengkap
            type: text
      - name: media
        label: Media
        type: object
        fields:
          - name: fileDokumen
            label: File dokumen
            type: file
            options:
              input: public/files/dokumen
              output: /files/dokumen
      - name: seo
        label: SEO
        type: object
        fields:
          - name: seoTitle
            label: SEO title
            type: string
          - name: seoDescription
            label: SEO description
            type: text
          - name: ogImage
            label: OG image path
            type: string
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: kategori
            label: Kategori dokumen
            type: select
            options:
              values:
                - value: layanan
                  label: Layanan warga
                - value: arsip
                  label: Arsip publik
                - value: kegiatan
                  label: Kegiatan
                - value: regulasi
                  label: Regulasi
            default: layanan
          - name: statusPublikasi
            label: Status tayang
            type: select
            options:
              values:
                - value: publish
                  label: Publish / Tayang
                - value: draft
                  label: Draft / Belum tayang
            default: publish
          - name: unggulan
            label: Dokumen unggulan
            type: boolean
            default: false
          - name: urutanTampil
            label: Urutan tampil
            type: number

  - name: kegiatan
    label: Berita & Kegiatan
    type: collection
    path: src/content/kegiatan
    filename: "{slug}/index.md"
    format: yaml-frontmatter
    view:
      fields: [judul, tanggal, statusPublikasi]
      primary: judul
      default:
        sort: tanggal
        order: desc
    fields:
      - name: judul
        label: Judul
        type: string
        required: true
      - name: tanggal
        label: Tanggal
        type: date
        required: true
      - name: statusPublikasi
        label: Status artikel
        type: select
        options:
          values:
            - value: publish
              label: Publish / Tayang
            - value: draft
              label: Draft / Belum tayang
        default: publish
        required: true
      - name: body
        label: Isi artikel
        type: rich-text
      - name: editorArtikel
        label: Editor Artikel
        type: object
        fields:
          - name: kontenUtama
            label: Konten Utama
            type: object
            fields:
              - name: ringkasan
                label: Ringkasan
                type: text
          - name: sidebar
            label: Sidebar
            type: object
            fields:
              - name: jenisKonten
                label: Jenis konten
                type: select
                options:
                  values:
                    - value: berita
                      label: Berita
                    - value: artikel
                      label: Artikel
                default: berita
              - name: kategori
                label: Kategori berita
                type: relation
                collection: kategoriBerita
                value: slug
                label_field: labelTampil
              - name: penulis
                label: Penulis
                type: string
              - name: unggulan
                label: Konten unggulan
                type: boolean
                default: false
              - name: gambarUtama
                label: Gambar utama
                type: image
                options:
                  input: public/images/kegiatan
                  output: /images/kegiatan
              - name: altGambarUtama
                label: Alt text gambar utama
                type: string
              - name: tag
                label: Tag artikel
                type: string
                list: true
          - name: seo
            label: SEO
            type: object
            fields:
              - name: seoTitle
                label: SEO title
                type: string
              - name: seoDescription
                label: SEO description
                type: text
              - name: ogImage
                label: OG image path
                type: string

  - name: agenda
    label: Agenda
    type: collection
    path: src/content/agenda
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [judul, tanggal, statusPublikasi]
      primary: judul
      default:
        sort: tanggal
        order: desc
    fields:
      - name: judul
        label: Judul agenda
        type: string
        required: true
      - name: tanggal
        label: Tanggal agenda
        type: date
      - name: statusPublikasi
        label: Status agenda
        type: select
        options:
          values:
            - value: publish
              label: Publish / Tayang
            - value: draft
              label: Draft / Belum tayang
        default: publish
        required: true
      - name: kontenUtama
        label: Konten Utama
        type: object
        fields:
          - name: waktuMulai
            label: Waktu mulai
            type: string
          - name: waktuSelesai
            label: Waktu selesai
            type: string
          - name: lokasi
            label: Lokasi kegiatan
            type: string
          - name: ringkasan
            label: Ringkasan agenda
            type: text
          - name: deskripsi
            label: Deskripsi lengkap
            type: text
          - name: kontakPic
            label: Kontak / PIC
            type: string
      - name: media
        label: Media
        type: object
        fields:
          - name: gambarUtama
            label: Gambar agenda
            type: image
            options:
              input: public/images/agenda
              output: /images/agenda
          - name: altGambarUtama
            label: Alt text gambar agenda
            type: string
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: unggulan
            label: Agenda unggulan
            type: boolean
            default: false

  - name: program
    label: Program Warga
    type: collection
    path: src/content/program
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [judul, tanggalUpdate, statusPublikasi]
      primary: judul
      default:
        sort: tanggalUpdate
        order: desc
    fields:
      - name: judul
        label: Nama program
        type: string
        required: true
      - name: tanggalUpdate
        label: Tanggal pembaruan
        type: date
      - name: statusPublikasi
        label: Status tayang
        type: select
        options:
          values:
            - value: publish
              label: Publish / Tayang
            - value: draft
              label: Draft / Belum tayang
        default: publish
        required: true
      - name: kontenUtama
        label: Konten Utama
        type: object
        fields:
          - name: ringkasan
            label: Ringkasan
            type: text
          - name: deskripsi
            label: Deskripsi lengkap
            type: text
          - name: lokasi
            label: Lokasi / wilayah
            type: string
          - name: periode
            label: Periode pelaksanaan
            type: string
          - name: penanggungJawab
            label: Penanggung jawab
            type: string
          - name: sumberDana
            label: Sumber dana
            type: string
          - name: anggaran
            label: Kisaran anggaran
            type: string
          - name: manfaat
            label: Manfaat untuk warga
            type: string
            list: true
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: kategori
            label: Kategori program
            type: select
            options:
              values:
                - value: infrastruktur
                  label: Infrastruktur
                - value: pelayanan
                  label: Pelayanan
                - value: pemberdayaan
                  label: Pemberdayaan
                - value: lingkungan
                  label: Lingkungan
            default: pelayanan
          - name: statusProgram
            label: Status program
            type: select
            options:
              values:
                - value: rencana
                  label: Rencana
                - value: berjalan
                  label: Berjalan
                - value: selesai
                  label: Selesai
            default: rencana
          - name: unggulan
            label: Tampilkan sebagai unggulan
            type: boolean
            default: false
          - name: urutanTampil
            label: Urutan tampil
            type: number

  - name: kasRt
    label: Transparansi Kas RT
    type: collection
    path: src/content/kas-rt
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [periode, tanggalUpdate, statusPublikasi]
      primary: periode
      default:
        sort: tanggalUpdate
        order: desc
    fields:
      - name: periode
        label: Periode laporan
        type: string
        required: true
      - name: tanggalUpdate
        label: Tanggal pembaruan
        type: date
      - name: ringkasan
        label: Ringkasan
        type: text
      - name: pemasukan
        label: Total pemasukan
        type: number
      - name: pengeluaran
        label: Total pengeluaran
        type: number
      - name: saldoAkhir
        label: Saldo akhir
        type: number
      - name: sumberDana
        label: Sumber dana utama
        type: string
        list: true
      - name: catatan
        label: Catatan
        type: text
      - name: statusPublikasi
        label: Status tayang
        type: select
        options:
          values:
            - value: publish
              label: Publish / Tayang
            - value: draft
              label: Draft / Belum tayang
        default: publish
      - name: unggulan
        label: Tampilkan sebagai unggulan
        type: boolean
        default: false

  - name: inventarisWarga
    label: Inventaris Warga
    type: collection
    path: src/content/inventaris-warga
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [namaItem, statusPinjam, kondisi]
      primary: namaItem
    fields:
      - name: namaItem
        label: Nama item
        type: string
        required: true
      - name: kategori
        label: Kategori
        type: select
        options:
          values:
            - value: acara
              label: Perlengkapan acara
            - value: kebersihan
              label: Kebersihan
            - value: dokumentasi
              label: Dokumentasi
            - value: logistik
              label: Logistik
        default: acara
      - name: kondisi
        label: Kondisi
        type: select
        options:
          values:
            - value: baik
              label: Baik
            - value: perlu-perawatan
              label: Perlu perawatan
            - value: terbatas
              label: Terbatas
        default: baik
      - name: statusPinjam
        label: Status peminjaman
        type: select
        options:
          values:
            - value: tersedia
              label: Tersedia
            - value: dipinjam
              label: Dipinjam
            - value: perawatan
              label: Perawatan
        default: tersedia
      - name: lokasiSimpan
        label: Lokasi simpan
        type: string
      - name: penanggungJawab
        label: Penanggung jawab
        type: string
      - name: ringkasan
        label: Ringkasan
        type: text
      - name: catatan
        label: Catatan
        type: text
      - name: statusPublikasi
        label: Status tayang
        type: select
        options:
          values:
            - value: publish
              label: Publish / Tayang
            - value: draft
              label: Draft / Belum tayang
        default: publish
      - name: unggulan
        label: Tampilkan sebagai unggulan
        type: boolean
        default: false
      - name: urutanTampil
        label: Urutan tampil
        type: number

  - name: umkm
    label: UMKM
    type: collection
    path: src/content/umkm
    filename: "{slug}/index.yaml"
    format: yaml
    fields:
      - name: namaUsaha
        label: Nama usaha
        type: string
        required: true
      - name: kontenUtama
        label: Konten Utama
        type: object
        fields:
          - name: pemilik
            label: Nama pemilik
            type: string
          - name: ringkasan
            label: Ringkasan usaha
            type: text
          - name: deskripsi
            label: Deskripsi lengkap
            type: text
          - name: whatsapp
            label: Nomor WhatsApp
            type: string
          - name: lokasi
            label: Lokasi usaha
            type: string
          - name: produkUnggulan
            label: Produk unggulan
            type: string
            list: true
      - name: media
        label: Media
        type: object
        fields:
          - name: gambar
            label: Foto produk utama
            type: image
            options:
              input: public/images/umkm
              output: /images/umkm
          - name: altGambar
            label: Alt text foto produk
            type: string
      - name: seo
        label: SEO
        type: object
        fields:
          - name: seoTitle
            label: SEO title
            type: string
          - name: seoDescription
            label: SEO description
            type: text
          - name: ogImage
            label: OG image path
            type: string
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: kategori
            label: Kategori usaha
            type: select
            options:
              values:
                - value: kuliner
                  label: Kuliner
                - value: kerajinan
                  label: Kerajinan
                - value: jasa
                  label: Jasa
                - value: perdagangan
                  label: Perdagangan
            default: kuliner
          - name: statusPublikasi
            label: Status tayang
            type: select
            options:
              values:
                - value: publish
                  label: Publish / Tayang
                - value: draft
                  label: Draft / Belum tayang
            default: publish
          - name: unggulan
            label: UMKM unggulan
            type: boolean
            default: false
          - name: urutanTampil
            label: Urutan tampil
            type: number

  - name: galeri
    label: Galeri
    type: collection
    path: src/content/galeri
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [judul, tanggal]
    fields:
      - name: judul
        label: Judul
        type: string
        required: true
      - name: tanggal
        label: Tanggal
        type: date
      - name: gambar
        label: Foto
        type: image
        options:
          input: public/images/galeri
          output: /images/galeri
      - name: caption
        label: Caption
        type: text

  - name: kategoriBerita
    label: Kategori Berita
    type: collection
    path: src/content/kategori-berita
    filename: "{slug}/index.yaml"
    format: yaml
    view:
      fields: [namaKategori, labelTampil]
    fields:
      - name: namaKategori
        label: Slug kategori
        type: string
        required: true
      - name: labelTampil
        label: Label tampil
        type: string
      - name: deskripsi
        label: Deskripsi singkat
        type: text
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: status
            label: Status tampil
            type: select
            options:
              values:
                - value: tampil
                  label: Tampilkan
                - value: sembunyi
                  label: Sembunyikan
            default: tampil
          - name: urutanTampil
            label: Urutan tampil
            type: number

  - name: strukturOrganisasi
    label: Struktur Organisasi
    type: collection
    path: src/content/struktur-organisasi
    filename: "{slug}/index.yaml"
    format: yaml
    fields:
      - name: jabatan
        label: Nama jabatan
        type: string
        required: true
      - name: kontenUtama
        label: Konten Utama
        type: object
        fields:
          - name: namaPejabat
            label: Nama pejabat / penanggung jawab
            type: string
          - name: deskripsiTugas
            label: Deskripsi tugas
            type: text
          - name: kontak
            label: Kontak
            type: string
      - name: pengaturanTampil
        label: Pengaturan Tampil
        type: object
        fields:
          - name: bidang
            label: Kelompok organisasi
            type: select
            options:
              values:
                - value: pimpinan
                  label: Pimpinan padukuhan
                - value: kegiatan
                  label: Koordinator kegiatan warga
                - value: wilayah
                  label: Penghubung wilayah
            default: pimpinan
          - name: statusPublikasi
            label: Status tayang
            type: select
            options:
              values:
                - value: publish
                  label: Publish / Tayang
                - value: draft
                  label: Draft / Belum tayang
            default: publish
          - name: urutanTampil
            label: Urutan tampil
            type: number

  - name: layananWarga
    label: Layanan Warga
    type: collection
    path: src/content/layanan-warga
    filename: "{slug}/index.yaml"
    format: yaml
    fields:
      - name: namaLayanan
        label: Nama layanan
        type: string
        required: true
      - name: ringkasan
        label: Ringkasan
        type: text
      - name: syarat
        label: Syarat
        type: string
        list: true
      - name: langkah
        label: Langkah
        type: string
        list: true
      - name: kontak
        label: Kontak
        type: string
      - name: jamLayanan
        label: Jam layanan
        type: string
      - name: statusTampil
        label: Status tampil
        type: select
        options:
          values:
            - value: tampil
              label: Tampilkan
            - value: sembunyi
              label: Sembunyikan
        default: tampil

  - name: faq
    label: FAQ
    type: collection
    path: src/content/faq
    filename: "{slug}/index.yaml"
    format: yaml
    fields:
      - name: pertanyaan
        label: Pertanyaan
        type: string
        required: true
      - name: jawaban
        label: Jawaban
        type: text
      - name: kategori
        label: Kategori
        type: string
      - name: urutan
        label: Urutan
        type: number
      - name: statusTampil
        label: Status tampil
        type: select
        options:
          values:
            - value: tampil
              label: Tampilkan
            - value: sembunyi
              label: Sembunyikan
        default: tampil

  - name: rt
    label: Daftar RT
    type: collection
    path: src/content/rt
    filename: '{fields.rt_id}.json'
    format: json
    fields:
      - name: rt_id
        label: ID RT
        type: string
        required: true
      - name: nomor_rt
        label: Nomor RT
        type: string
      - name: nama_ketua
        label: Nama Ketua RT
        type: string
      - name: no_hp_ketua
        label: No. HP/WA Ketua RT
        type: string
      - name: aktif
        label: RT Aktif
        type: boolean
        default: true
      - name: catatan
        label: Catatan
        type: text

  # ─── SINGLETONS (type: file) ────────────────────────────────────

  - name: profil
    label: Profil Padukuhan
    type: file
    path: src/content/singletons/profil/index.yaml
    fields:
      - name: namaPadukuhan
        label: Nama padukuhan
        type: string
      - name: tagline
        label: Tagline
        type: text
      - name: hero
        label: Hero Profil
        type: object
        fields:
          - name: gambar
            label: Gambar hero
            type: image
            options:
              input: public/images/profil
              output: /images/profil
          - name: judul
            label: Judul overlay hero
            type: string
          - name: badge
            label: Badge hero
            type: string
      - name: sejarahLabel
        label: Label section sejarah
        type: string
      - name: sejarahJudul
        label: Judul section sejarah
        type: string
      - name: sejarahSingkat
        label: Isi sejarah
        type: text
      - name: visi
        label: Visi
        type: text
      - name: misi
        label: Misi
        type: string
        list: true
      - name: potensiDesa
        label: Potensi Desa
        type: object
        list: true
        fields:
          - name: ikon
            label: Nama ikon Material
            type: string
          - name: judul
            label: Judul potensi
            type: string
          - name: deskripsi
            label: Deskripsi
            type: text
      - name: lokasi
        label: Lokasi & Peta
        type: object
        fields:
          - name: gambarPeta
            label: Gambar peta / foto lokasi
            type: image
            options:
              input: public/images/profil
              output: /images/profil
          - name: alamat
            label: Alamat lengkap
            type: text
          - name: linkPeta
            label: Link Google Maps
            type: string
      - name: dataWilayah
        label: Data wilayah
        type: object
        list: true
        fields:
          - name: label
            label: Label data
            type: string
          - name: value
            label: Nilai
            type: string

  - name: pengaturan
    label: Pengaturan Situs
    type: file
    path: src/content/singletons/pengaturan/index.yaml
    fields:
      - name: alamat
        label: Alamat
        type: text
      - name: kontakWhatsApp
        label: Nomor WhatsApp
        type: string
      - name: email
        label: Email
        type: string
      - name: jamLayanan
        label: Jam layanan
        type: string
      - name: linkPeta
        label: Link embed peta
        type: string
      - name: sambutanBeranda
        label: Sambutan beranda
        type: text
      - name: seoHalamanData
        label: SEO Halaman Data
        type: object
        fields:
          - name: dataUtama
            label: SEO Halaman Data Utama
            type: object
            fields:
              - name: seoTitle
                label: SEO title halaman Data
                type: string
              - name: seoDescription
                label: SEO description halaman Data
                type: text
              - name: ogImage
                label: OG image halaman Data
                type: string
          - name: pengumuman
            label: SEO Halaman Pengumuman
            type: object
            fields:
              - name: seoTitle
                label: SEO title halaman Pengumuman
                type: string
              - name: seoDescription
                label: SEO description halaman Pengumuman
                type: text
              - name: ogImage
                label: OG image halaman Pengumuman
                type: string
          - name: dokumen
            label: SEO Halaman Dokumen
            type: object
            fields:
              - name: seoTitle
                label: SEO title halaman Dokumen
                type: string
              - name: seoDescription
                label: SEO description halaman Dokumen
                type: text
              - name: ogImage
                label: OG image halaman Dokumen
                type: string
          - name: umkm
            label: SEO Halaman UMKM
            type: object
            fields:
              - name: seoTitle
                label: SEO title halaman UMKM
                type: string
              - name: seoDescription
                label: SEO description halaman UMKM
                type: text
              - name: ogImage
